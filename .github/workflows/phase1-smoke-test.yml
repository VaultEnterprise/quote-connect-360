name: Phase 1 Broker Agency Smoke Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  phase1-smoke-test:
    name: Phase 1 Broker Agency Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 1 Broker Agency Model Validation Harness
        run: npx jest tests/phase1-broker-agency-model-validation-harness.test.js --no-coverage --forceExit
        env:
          NODE_ENV: test

      - name: Run Phase 1 Schema Validation
        run: npx jest tests/phase1-schema-validation.test.js --no-coverage --forceExit
        env:
          NODE_ENV: test

      - name: Run Gate 7A-0 Tests
        run: npx jest tests/gate7a/gate7a-0-*.test.js --no-coverage --forceExit
        env:
          NODE_ENV: test

      - name: Run Gate 7A-1 Tests
        run: npx jest tests/gate7a/gate7a-1-*.test.js --no-coverage --forceExit
        env:
          NODE_ENV: test

      - name: Run Gate 7A-2 Tests
        run: npx jest tests/gate7a/gate7a-2-*.test.js --no-coverage --forceExit
        env:
          NODE_ENV: test

      - name: Run Gate 7A-3 Tests
        run: npx jest tests/gate7a/gate7a-3-*.test.js --no-coverage --forceExit
        env:
          NODE_ENV: test
